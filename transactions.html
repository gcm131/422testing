<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="container nav-flex">
        <div class="logo">
            <h2>Real Estate Management</h2>
        </div>
        <div class="nav-links">
            <a href="index.html">Properties</a>
            <a href="addproperty.html">Add Property</a>
            <a href="editproperty.html">Edit property</a>
            <a href="transactions.html" class="active">Transactions</a>
            <a href="estimate.html">Price Estimator</a>
        </div>
    </div>
</div>

<main class="container">
    <div class="page-header">
        <h1>Property Transactions</h1>
        <p>Track property sales, buyers, sellers, and payment methods.</p>
    </div>

    <div class="card">
        <div class="flex-between">
            <h3>Transaction History</h3>
            <button id="addSampleTransactionBtn" class="btn-outline">Simulate Sale</button>
        </div>
        
        <div style="overflow-x: auto; margin-top: 20px;">
            <table id="transactionTable" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #eee;">
                        <th>Transaction ID</th>
                        <th>Property</th>
                        <th>Buyer</th>
                        <th>Seller</th>
                        <th>Sale Price ($)</th>
                        <th>Date</th>
                        <th>Payment Method</th>
                    </tr>
                </thead>
                
                <tbody id="transactionBody">
                    <tr><td colspan="7" style="text-align:center; padding: 20px;">Loading transactions...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="transactions.js"></script>

</body>
</html>
