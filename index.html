<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Management</title>
    <link  rel="stylesheet" href="style.css " >
</head>
<body>

<div class="navbar">
    <div class="container nav-flex" >
        <div class="logo" >
            <h2>Real Estate Management</h2 >
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Properties</a>
            <a href="addproperty.html">Add Property</a>
						<a href = "editproperty.html"> Edit property</a>
            <a href="transactions.html">Transactions</a>
            <a href="estimate.html">Price Estimator</a>
        </div>
    </div>
</div>

<main class="container">
    <div class="page-header">
        <h1>Property Listings</h1>
        <p>Manage, search, and filter all property records.</p>
    </div>

    <div class="card">
        <div class="filter-bar">
            <div class="filter-group">
                <label>City</label>
                <input type="text" id="filterCity" placeholder="e.g., Chicago">
            </div>
            <div class="filter-group">
                <label>Price Range</label>
                <select id="filterPriceRange">
                    <option value="">Any price</option>
                    <option value="0-200000">$0 - $200k</option>
                    <option value="200000-500000">$200k - $500k</option>
                    <option value="500000-1000000">$500k - $1M</option>
                    <option value="1000000-99999999">$1M+</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Type</label>
                <select id="filterType">
                    <option value="">All</option>
                    <option value="House">House</option>
                    <option value="Apartment">Apartment</option>
                    <option value="Condo">Condo</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="filterStatus">
                    <option value="">All</option>
                    <option value="Available">Available</option>
                    <option value="Sold">Sold</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
            <div>
                <button id="applyFiltersBtn">Apply Filters</button>
                <button id="resetFiltersBtn" class="btn-outline">Reset</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="flex-between">
            <h3>All Properties</h3>
            <button id="refreshBtn" class="btn-sm">⟳ Refresh</button>
        </div>
		<!--STYLING FIX IT IN A SEC -->
        <div style="overflow-x: auto;">
            <table id="propertyTable">
                <thead>
                    <tr>
                        <th>ID</th><th>Title</th><th>City</th><th>Type</th><th>Bed/Bath</th><th>Sq Ft</th><th>Price ($)</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="propertyTableBody">
				<!--STYLING FIX IT IN A SEC -->
                    <tr><td colspan="9" style="text-align:center;" > Loading properties...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
